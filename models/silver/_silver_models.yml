version: 2

models:
  - name: stg_nato__country_stats
    description: "Staging de estadísticas de países OTAN. Tipos casteados (INTEGER/FLOAT/BOOLEAN). Fuente: bronze_country_stats."
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: country
        tests: [not_null]
      - name: iso_code
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: _loaded_at
        tests: [not_null]

  - name: stg_nato__equipment_inventory
    description: "Staging de inventario de equipamiento OTAN. Tipos casteados. Fuente: bronze_equipment_inventory."
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: country
        tests: [not_null]
      - name: iso_code
        tests: [not_null]
      - name: equipment_type
        tests: [not_null]
      - name: domain
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Air', 'Land', 'Sea', 'Support']
      - name: _loaded_at
        tests: [not_null]

  - name: stg_nato__operations_missions
    description: "Staging de operaciones y misiones OTAN. Tipos casteados. Fuente: bronze_operations_missions."
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: mission_name
        tests: [not_null]
      - name: lead_country
        tests: [not_null]
      - name: _loaded_at
        tests: [not_null]

  - name: stg_nato__mission_participants
    description: "Staging de participantes en misiones OTAN. Tipos casteados. Fuente: bronze_mission_participants."
    columns:
      - name: participant_id
        tests: [not_null, unique]
      - name: mission_record_id
        tests: [not_null]
      - name: country
        tests: [not_null]
      - name: _loaded_at
        tests: [not_null]
