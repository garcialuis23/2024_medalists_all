version: 2

models:
  - name: stg_nato__country_stats
    description: "Estadísticas anuales por país OTAN. Tipos casteados, columnas en español."
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: pais
        tests: [not_null]
      - name: codigo_iso
        tests: [not_null]
      - name: anio
        tests: [not_null]
      - name: cargado_en
        tests: [not_null]

  - name: stg_nato__equipment_inventory
    description: "Inventario de equipamiento militar por país OTAN. Tipos casteados, columnas en español."
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: pais
        tests: [not_null]
      - name: codigo_iso
        tests: [not_null]
      - name: tipo_equipamiento
        tests: [not_null]
      - name: dominio
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Air', 'Land', 'Sea', 'Support']
      - name: cargado_en
        tests: [not_null]

  - name: stg_nato__operations_missions
    description: "Operaciones y misiones OTAN. Tipos casteados, columnas en español."
    columns:
      - name: record_id
        tests: [not_null, unique]
      - name: nombre_mision
        tests: [not_null]
      - name: pais_lider
        tests: [not_null]
      - name: cargado_en
        tests: [not_null]

  - name: stg_nato__mission_participants
    description: "Participantes en misiones OTAN. Tipos casteados, columnas en español."
    columns:
      - name: id_participante
        tests: [not_null, unique]
      - name: id_mision
        tests: [not_null]
      - name: pais
        tests: [not_null]
      - name: cargado_en
        tests: [not_null]
