version: 2

models:
  - name: dim_pais
    description: >
      Dimensión de países Gold. Una fila por país (90 registros, incluido 'País Desconocido').
      Combina atributos descriptivos del país (códigos ISO, COI) con métricas de medallas
      pre-agregadas para facilitar queries analíticos sin JOINs adicionales.
      Usar es_pais_conocido = TRUE para excluir el registro comodín en rankings.
    columns:
      - name: id_pais
        description: "PK. Identificador Wikidata del país. 'N/A' para el registro 'País Desconocido'."
        tests: [not_null, unique]
      - name: nombre
        description: "Nombre del país. 'País Desconocido' para el registro comodín."
        tests: [not_null]
      - name: codigo_iso2
        description: "Código ISO 3166-1 alpha-2 (2 letras, p. ej. ES). NULL para el comodín."
      - name: codigo_iso3
        description: "Código ISO 3166-1 alpha-3 (3 letras, p. ej. ESP). NULL para el comodín."
      - name: codigo_coi
        description: "Código del Comité Olímpico Internacional (3 letras). NULL para el comodín."
      - name: es_pais_conocido
        description: "TRUE para países reales, FALSE para el registro comodín 'N/A'. Filtrar en rankings y dashboards."
        tests: [not_null]
      - name: total_medallas
        description: "Total de medallas acreditadas al país en París 2024."
      - name: medallas_oro
        description: "Número de medallas de oro del país."
      - name: medallas_plata
        description: "Número de medallas de plata del país."
      - name: medallas_bronce
        description: "Número de medallas de bronce del país."

  - name: dim_atleta
    description: >
      Dimensión de atletas Gold (1,949 registros). Desnormaliza el lugar de nacimiento
      directamente en el atleta: nombre del lugar, región, coordenadas y código NUTS3 europeo.
      Los atletas no europeos tendrán NULL en id_nuts3_nacimiento.
    columns:
      - name: id_atleta
        description: "PK. Identificador Wikidata del atleta."
        tests: [not_null, unique]
      - name: nombre
        description: "Nombre completo del atleta."
        tests: [not_null]
      - name: enlace
        description: "URL de la página Wikidata del atleta."
      - name: fecha_nacimiento
        description: "Fecha de nacimiento (DATE). NULL para los 17 atletas sin dato."
      - name: sexo
        description: "Sexo o género del atleta (p. ej. male, female)."
      - name: lugar_nacimiento
        description: "Nombre del lugar de nacimiento. NULL si no consta en Wikidata."
      - name: region_nacimiento
        description: "Nombre de la entidad administrativa superior del lugar de nacimiento."
      - name: lat_nacimiento
        description: "Latitud del lugar de nacimiento en grados decimales (FLOAT)."
      - name: lon_nacimiento
        description: "Longitud del lugar de nacimiento en grados decimales (FLOAT)."
      - name: id_nuts3_nacimiento
        description: "Código NUTS3 del lugar de nacimiento. NULL para atletas no europeos (aprox. 56% del dataset)."

  - name: dim_evento
    description: >
      Dimensión de eventos Gold (325 registros). Aplanada: una sola fila por evento
      contiene el nombre del evento, su disciplina y su deporte, evitando JOINs en cascada.
    columns:
      - name: id_evento
        description: "PK. Identificador Wikidata del evento olímpico."
        tests: [not_null, unique]
      - name: nombre_evento
        description: "Nombre completo del evento (p. ej. Men's 100m Athletics)."
        tests: [not_null]
      - name: enlace_evento
        description: "URL de la página Wikidata del evento."
      - name: id_disciplina
        description: "Identificador Wikidata de la disciplina. 'N/A' para el evento sin disciplina asignada."
      - name: nombre_disciplina
        description: "Nombre de la disciplina (p. ej. athletics at the 2024 Summer Olympics)."
      - name: id_deporte
        description: "Identificador Wikidata del deporte."
      - name: nombre_deporte
        description: "Nombre del deporte (p. ej. athletics, swimming)."

  - name: dim_nuts
    description: >
      Jerarquía NUTS completa desnormalizada Gold (445 registros NUTS3).
      Una fila por región NUTS3 con todos sus niveles superiores resueltos (NUTS2, NUTS1, NUTS0).
      Solo cubre regiones con al menos un atleta europeo en el dataset.
    columns:
      - name: id_nuts3
        description: "PK. Código NUTS nivel 3 (unidad local, p. ej. ES300)."
        tests: [not_null, unique]
      - name: nombre_nuts3
        description: "Nombre de la unidad local NUTS3."
      - name: poblacion_nuts3
        description: "Población de la unidad NUTS3 (fuente Eurostat)."
      - name: pib_nuts3
        description: "PIB de la unidad NUTS3 en millones EUR (fuente Eurostat)."
      - name: id_nuts2
        description: "Código NUTS nivel 2 (subregión, p. ej. ES30)."
      - name: nombre_nuts2
        description: "Nombre de la subregión NUTS2."
      - name: poblacion_nuts2
        description: "Población de la subregión NUTS2."
      - name: pib_nuts2
        description: "PIB de la subregión NUTS2 en millones EUR."
      - name: id_nuts1
        description: "Código NUTS nivel 1 (gran región, p. ej. ES3)."
      - name: nombre_nuts1
        description: "Nombre de la gran región NUTS1."
      - name: id_nuts0
        description: "Código NUTS nivel 0 (país, p. ej. ES)."
      - name: nombre_nuts0
        description: "Nombre del país NUTS0."

  - name: fact_medalla
    description: >
      Tabla de hechos analítica Gold (2,202 registros). Una fila por medalla con todas
      las dimensiones clave resueltas: atleta, país acreedor, delegación, evento con
      disciplina y deporte desnormalizados, y jerarquía NUTS completa (niveles 0–3)
      para atletas europeos. El ~56% de las medallas tiene id_nuts3 = NULL (atletas
      no europeos). Diseñada para consumo directo en BI sin JOINs adicionales.
    columns:
      - name: id_medalla
        description: "PK surrogate. MD5 de (wikidata_id_atleta || '|' || wikidata_id_evento). Reproducible entre runs."
        tests: [not_null, unique]
      - name: tipo_medalla
        description: "Tipo de medalla: gold, silver o bronze."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['gold', 'silver', 'bronze']
      - name: id_atleta
        description: "FK → dim_atleta. Identificador Wikidata del atleta."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_atleta')
                field: id_atleta
      - name: nombre_atleta
        description: "Nombre completo del atleta (desnormalizado desde dim_atleta)."
      - name: fecha_nacimiento
        description: "Fecha de nacimiento del atleta (DATE). NULL para los 17 atletas sin dato."
      - name: id_pais
        description: "FK → dim_pais. País acreedor de la medalla. 'N/A' para refugiados y neutrales AIN."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_pais')
                field: id_pais
      - name: id_delegacion
        description: "Identificador Wikidata de la delegación bajo la que compitió el atleta."
      - name: id_evento
        description: "FK → dim_evento. Identificador Wikidata del evento olímpico."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_evento')
                field: id_evento
      - name: nombre_evento
        description: "Nombre completo del evento (desnormalizado desde dim_evento)."
      - name: nombre_disciplina
        description: "Nombre de la disciplina del evento (desnormalizado desde dim_evento)."
      - name: nombre_deporte
        description: "Nombre del deporte del evento (desnormalizado desde dim_evento)."
      - name: id_nuts3
        description: "FK → dim_nuts. Código NUTS3 del lugar de nacimiento. NULL para atletas no europeos (~56%)."
        tests:
          - relationships:
              arguments:
                to: ref('dim_nuts')
                field: id_nuts3
              config:
                severity: warn
      - name: id_nuts2
        description: "Código NUTS2 (subregión). NULL para atletas no europeos."
      - name: id_nuts1
        description: "Código NUTS1 (gran región). NULL para atletas no europeos."
      - name: id_nuts0
        description: "Código NUTS0 (país europeo). NULL para atletas no europeos."
