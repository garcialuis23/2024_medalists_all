version: 2

seeds:
  - name: "2024_medalists_all"
    description: >
      CSV de medallistas de los Juegos Olímpicos de París 2024, enriquecido con datos
      de Wikidata (atletas, países, eventos) y con jerarquía NUTS para atletas europeos.
      Fuente: Wikidata / datos públicos. Cópialo en seeds/ y ejecuta `dbt seed`.
    config:
      column_types:
        medalist_wikidata_id: varchar
        medalist_link: varchar
        medalist_name: varchar
        medal: varchar
        delegation_wikidata_id: varchar
        delegation_link: varchar
        delegation_name: varchar
        country_medal_wikidata_id: varchar
        country_medal: varchar
        country_medal_code2: varchar
        country_medal_code3: varchar
        country_medal_ioc_country_code: varchar
        country_medal_nuts_code: varchar
        date_of_birth: varchar
        place_of_birth_wikidata_id: varchar
        place_of_birth: varchar
        place_of_birth_located_in_wikidata_id: varchar
        place_of_birth_located_in: varchar
        place_of_birth_coordinates: varchar
        lat: varchar
        lon: varchar
        sex_or_gender_wikidata_id: varchar
        sex_or_gender: varchar
        event_wikidata_id: varchar
        event_link: varchar
        event_name: varchar
        event_part_of_wikidata_id: varchar
        event_part_of: varchar
        event_sport_wikidata_id: varchar
        event_sport: varchar
        event_part_of_sport_wikidata_id: varchar
        event_part_of_sport: varchar
        sport_wikidata_id: varchar
        sport: varchar
        nuts1_id: varchar
        nuts1_name: varchar
        nuts2_id: varchar
        nuts2_name: varchar
        nuts3_id: varchar
        nuts3_name: varchar
        nuts2_population: varchar
        nuts3_population: varchar
        nuts2_gdp: varchar
        nuts3_gdp: varchar
        nuts0_id: varchar
        nuts0_name: varchar
