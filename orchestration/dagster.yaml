# dagster.yaml — Configuración de instancia Dagster
# Referencia: https://docs.dagster.io/deployment/dagster-instance

storage:
  sqlite:
    base_dir: "/tmp/dagster_home"

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 5

run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher

telemetry:
  enabled: false
