name: 'operation_medallion'
version: '1.0.0'
config-version: 2

profile: 'operation_medallion'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  operation_medallion:
    bronze:
      +materialized: table
      +database: BRONZE_DB
      +schema: PUBLIC

    silver:
      +materialized: table
      +database: SILVER_DB
      +schema: PUBLIC

    gold:
      +materialized: table
      +database: GOLD_DB
      +schema: PUBLIC
